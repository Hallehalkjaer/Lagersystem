services:
  db:
    image: postgres:18
    environment:
      POSTGRES_USER: webapp
      POSTGRES_PASSWORD: very_strong_secret_password
      POSTGRES_DB: webapp
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "webapp", "-d", "webapp"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - ./db_init:/docker-entrypoint-initdb.d

  backend:
    build: .
    environment:
      DB_NAME: webapp
      DB_USER: webapp
      DB_PASSWORD: very_strong_secret_password
      DB_HOST: db
    ports:
      - "8080:8080"
      - "5000:5000"
    depends_on:
      db:
        condition:
          service_healthy
    